<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>사주타로 — 무료 사주풀이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/suit@v1.0.3/packages/suit/dist/suit.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f0e8d8; --card: #faf5eb; --border: #d4b896;
      --text: #3d1f0f; --text-sub: #8a6340; --text-muted: #a0856a;
      --step-active: #6b2d14; --step-inactive: #c4a882;
      --divider: #c4a882; --input-bg: #fffef5; --focus: #9b3a1c;
    }
    body { background:var(--bg); color:var(--text); font-family:'SUIT','Noto Sans KR',sans-serif; min-height:100vh; }
    h1,h2,h3 { font-family:'Noto Serif KR',serif; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px;
            box-shadow:0 2px 12px rgba(107,45,20,.08); margin-bottom:12px; }
    .input-f { background:var(--input-bg); border:1px solid var(--border); border-radius:10px;
               padding:10px 14px; width:100%; color:var(--text); font-size:14px; }
    .input-f:focus { outline:none; border-color:var(--focus); }
    select.input-f option { background:var(--input-bg); }
    .btn-cta {
      background: linear-gradient(135deg, #6b2d14 0%, #9b3a1c 60%, #8b2e18 100%);
      color:#fff; border:none; border-radius:12px; padding:15px;
      font-weight:700; font-size:15px; cursor:pointer;
      box-shadow:0 4px 16px rgba(107,45,20,.4);
      transition:all .2s; letter-spacing:.5px;
      font-family:'Noto Serif KR',serif;
    }
    .btn-cta:hover { filter:brightness(1.1); transform:translateY(-1px); }
    .btn-cta:disabled { opacity:.4; cursor:not-allowed; transform:none; }
    .btn-sec { background:var(--bg); color:var(--step-active);
               border:1.5px solid var(--step-active); border-radius:12px; padding:14px;
               font-weight:600; font-size:14px; cursor:pointer; transition:all .2s; }
    .step-tab { flex:1; padding:10px 6px; text-align:center; border-radius:10px; transition:all .2s; }
    .step-tab.active { background:var(--step-active); color:#fff; font-weight:700; }
    .step-tab.inactive { background:transparent; color:var(--step-inactive); }
    .divider-label { display:flex; align-items:center; gap:8px; margin:8px 0 12px; color:var(--text-sub); font-size:11px; letter-spacing:1px; }
    .divider-label::before,.divider-label::after { content:''; flex:1; height:1px; background:var(--divider); }
    .gender-btn { flex:1; padding:11px; border-radius:10px; border:1.5px solid var(--border);
                  font-size:14px; font-weight:500; color:var(--text-sub); cursor:pointer;
                  background:var(--input-bg); transition:all .2s; }
    .gender-btn.on { border-color:var(--focus); color:var(--step-active); font-weight:700; background:#fff5ee; }
    .oh-bar { height:8px; border-radius:4px; background:#ede0cc; }
    .oh-fill { height:8px; border-radius:4px; }
    .pillar-top { font-size:26px; font-weight:700; color:#6b2d14; }
    .pillar-bot { font-size:22px; font-weight:600; color:#9b3a1c; }
  </style>
</head>
<body>
<div style="max-width:420px;margin:0 auto;padding:28px 18px 60px;" id="app">

  <!-- 헤더 -->
  <div style="text-align:center;margin-bottom:24px;">
    <div style="width:68px;height:68px;background:#6b2d14;border-radius:50%;
                display:inline-flex;align-items:center;justify-content:center;
                margin-bottom:12px;font-size:30px;color:#f5e6d0;
                box-shadow:0 4px 16px rgba(107,45,20,.3), 0 0 0 3px #d4a870;">☯</div>
    <h1 style="font-size:26px;font-weight:700;margin-bottom:4px;">사주타로</h1>
    <p style="font-size:13px;color:var(--text-sub);">운명을 읽는 시간</p>
    <a href="https://taehyun1121.github.io/saju-tarot-site/" target="_blank"
       style="font-size:11px;color:var(--focus);text-decoration:underline;margin-top:4px;display:inline-block;">
      ✨ AI 해석 포함 프로 버전 →
    </a>
  </div>

  <!-- 스텝 인디케이터 -->
  <div style="display:flex;gap:6px;background:var(--card);border:1px solid var(--border);
              border-radius:14px;padding:6px;margin-bottom:20px;">
    <div class="step-tab active" id="step1-tab">
      <div style="font-size:16px;font-weight:800;margin-bottom:1px;">1</div>
      <div style="font-size:10px;">정보입력</div>
    </div>
    <div class="step-tab inactive" id="step2-tab">
      <div style="font-size:16px;font-weight:800;margin-bottom:1px;">2</div>
      <div style="font-size:10px;">사주풀이</div>
    </div>
    <div class="step-tab inactive" id="step3-tab">
      <div style="font-size:16px;font-weight:800;margin-bottom:1px;">3</div>
      <div style="font-size:10px;">타로리딩</div>
    </div>
  </div>

  <!-- ── STEP 1: 정보 입력 ── -->
  <div id="step1">
    <div class="divider-label">기본 정보</div>
    <div class="card">
      <div style="margin-bottom:14px;">
        <label style="font-size:12px;color:var(--text-sub);display:block;margin-bottom:6px;">이름 / 닉네임</label>
        <input id="inp-name" class="input-f" placeholder="이름을 입력하세요" />
      </div>
      <div>
        <label style="font-size:12px;color:var(--text-sub);display:block;margin-bottom:6px;">성별</label>
        <div style="display:flex;gap:8px;">
          <button class="gender-btn" id="btn-male" onclick="setGender('male')">남성</button>
          <button class="gender-btn" id="btn-female" onclick="setGender('female')">여성</button>
        </div>
      </div>
    </div>

    <div class="divider-label">생년월일 · 시간</div>
    <div class="card">
      <div style="margin-bottom:14px;">
        <label style="font-size:12px;color:var(--text-sub);display:block;margin-bottom:6px;">생년월일</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <select id="sel-year" class="input-f"><option value="">년도</option></select>
          <select id="sel-month" class="input-f"><option value="">월</option></select>
          <select id="sel-day" class="input-f"><option value="">일</option></select>
        </div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <label style="font-size:12px;color:var(--text-sub);">태어난 시간</label>
          <label style="font-size:11px;color:var(--focus);display:flex;align-items:center;gap:4px;cursor:pointer;">
            <input type="checkbox" id="hour-unknown" style="accent-color:var(--focus);"/> 시간 모름
          </label>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <select id="sel-hour" class="input-f"><option value="">시</option></select>
          <select id="sel-minute" class="input-f"><option value="">분</option></select>
        </div>
      </div>
    </div>

    <div id="step1-error" style="color:#9b3a1c;font-size:13px;text-align:center;margin-bottom:8px;display:none;"></div>
    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn-sec" style="width:28%;" onclick="setHourUnknown()">시간 모름</button>
      <button id="btn-calc" class="btn-cta" style="flex:1;" onclick="calculate()" disabled>🔮 사주풀이 시작</button>
    </div>
  </div>

  <!-- ── STEP 2: 결과 ── -->
  <div id="step2" style="display:none;">
    <div class="divider-label">사주 원국 (四柱)</div>
    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;" id="pillars-grid"></div>
    </div>

    <div class="divider-label">오행 분포 (五行)</div>
    <div class="card">
      <div id="ohaeng-bars" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div id="lacking-box" style="margin-top:14px;padding-top:14px;border-top:1px solid var(--divider);display:none;">
        <p style="font-size:11px;color:var(--text-sub);margin-bottom:8px;">부족한 오행</p>
        <div id="lacking-list" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
        <p style="font-size:12px;color:var(--text-muted);margin-top:6px;">보완이 필요한 기운이에요</p>
      </div>
      <div id="balanced-msg" style="font-size:13px;color:#5a8040;text-align:center;margin-top:12px;display:none;">✦ 오행이 균형 잡혀 있어요</div>
    </div>

    <div class="divider-label">일간 해석</div>
    <div class="card">
      <p id="ilgan-desc" style="font-size:14px;color:var(--text-sub);line-height:1.8;"></p>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <button class="btn-sec" style="flex:1;" onclick="goStep(1)">← 다시 입력</button>
      <button class="btn-cta" style="flex:1;" onclick="goTarot()">🃏 타로 리딩</button>
    </div>
  </div>

  <!-- ── STEP 3: 타로 ── -->
  <div id="step3" style="display:none;">
    <div class="divider-label">오늘의 타로</div>
    <div class="card" style="text-align:center;">
      <p style="font-size:13px;color:var(--text-sub);margin-bottom:16px;">
        질문을 마음속에 담고 카드를 뽑아보세요
      </p>
      <div id="tarot-question-area">
        <textarea id="tarot-question" class="input-f" rows="2"
          placeholder="예: 지금 나의 연애운은? 직장 이동이 좋을까요?"
          style="resize:none;margin-bottom:12px;"></textarea>
        <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px;">5장의 카드가 뽑힙니다</p>
        <button id="btn-draw" class="btn-cta" style="width:100%;" onclick="drawCards()">✨ 카드 뽑기</button>
      </div>
    </div>

    <div id="tarot-result" style="display:none;">
      <div class="divider-label">카드 해석</div>
      <div id="tarot-cards" style="display:flex;flex-direction:column;gap:12px;"></div>
      <div style="margin-top:12px;padding:14px;background:#fff8f0;border:1px solid var(--border);
                  border-radius:12px;font-size:12px;color:var(--text-sub);text-align:center;">
        AI 해석 + 사주 연계 분석은
        <a href="https://taehyun1121.github.io/saju-tarot-site/" target="_blank"
           style="color:var(--focus);font-weight:700;">프로 버전</a>에서 제공됩니다
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="btn-sec" style="flex:1;" onclick="resetTarot()">다시 뽑기</button>
        <button class="btn-sec" style="flex:1;" onclick="goStep(2)">← 사주풀이</button>
      </div>
    </div>
  </div>

</div>

<script src="saju.js"></script>
<script>
  // 셀렉트 초기화
  const yearSel = document.getElementById('sel-year');
  const monthSel = document.getElementById('sel-month');
  const daySel = document.getElementById('sel-day');
  const hourSel = document.getElementById('sel-hour');
  const minuteSel = document.getElementById('sel-minute');

  for (let y = 2010; y >= 1920; y--) {
    const o = document.createElement('option'); o.value = y; o.textContent = `${y}년`; yearSel.appendChild(o);
  }
  for (let m = 1; m <= 12; m++) {
    const o = document.createElement('option'); o.value = m; o.textContent = `${m}월`; monthSel.appendChild(o);
  }
  for (let d = 1; d <= 31; d++) {
    const o = document.createElement('option'); o.value = d; o.textContent = `${d}일`; daySel.appendChild(o);
  }
  for (let h = 0; h <= 23; h++) {
    const o = document.createElement('option'); o.value = h; o.textContent = `${h}시`; hourSel.appendChild(o);
  }
  for (let i = 0; i < 12; i++) {
    const min = i * 5;
    const o = document.createElement('option'); o.value = min; o.textContent = `${String(min).padStart(2,'0')}분`;
    minuteSel.appendChild(o);
  }

  let gender = null;

  function setGender(g) {
    gender = g;
    document.getElementById('btn-male').className = 'gender-btn' + (g === 'male' ? ' on' : '');
    document.getElementById('btn-female').className = 'gender-btn' + (g === 'female' ? ' on' : '');
    validate();
  }

  function setHourUnknown() {
    document.getElementById('hour-unknown').checked = true;
    hourSel.disabled = true; minuteSel.disabled = true;
    hourSel.value = ''; minuteSel.value = '';
    validate();
  }

  document.getElementById('hour-unknown').addEventListener('change', function() {
    hourSel.disabled = this.checked;
    minuteSel.disabled = this.checked;
    if (this.checked) { hourSel.value = ''; minuteSel.value = ''; }
    validate();
  });

  ['sel-year','sel-month','sel-day','sel-hour','inp-name'].forEach(id => {
    document.getElementById(id).addEventListener('input', validate);
    document.getElementById(id).addEventListener('change', validate);
  });

  function validate() {
    const y = yearSel.value, m = monthSel.value, d = daySel.value;
    const hourOk = document.getElementById('hour-unknown').checked || hourSel.value !== '';
    document.getElementById('btn-calc').disabled = !(y && m && d && gender && hourOk);
  }

  function goStep(n) {
    document.getElementById('step1').style.display = n === 1 ? '' : 'none';
    document.getElementById('step2').style.display = n === 2 ? '' : 'none';
    document.getElementById('step3').style.display = n === 3 ? '' : 'none';
    ['step1-tab','step2-tab','step3-tab'].forEach((id, i) => {
      const el = document.getElementById(id);
      el.className = 'step-tab ' + (i + 1 === n ? 'active' : 'inactive');
    });
    window.scrollTo(0, 0);
  }

  function calculate() {
    const year = +yearSel.value, month = +monthSel.value, day = +daySel.value;
    const hourUnknown = document.getElementById('hour-unknown').checked;
    const hour = hourUnknown ? null : +hourSel.value;

    const result = calcAllPillars(year, month, day, hour);

    // 4주 기둥
    const OH_COLOR = {'木':'#4ade80','火':'#ef4444','土':'#f59e0b','金':'#94a3b8','水':'#60a5fa'};
    const labels = ['년주','월주','일주','시주'];
    const keys = ['yeonju','wolju','ilju','siju'];
    const grid = document.getElementById('pillars-grid');
    grid.innerHTML = '';
    keys.forEach((k, i) => {
      const p = result.pillars[k];
      const top = p ? p.gan : '-';
      const bot = p ? p.ji : (k === 'siju' ? '모름' : '-');
      grid.innerHTML += `
        <div style="background:var(--input-bg);border:1px solid var(--border);border-radius:12px;
                    padding:12px 6px;text-align:center;">
          <div style="font-size:10px;color:var(--text-sub);margin-bottom:8px;">${labels[i]}</div>
          <div class="pillar-top">${top}</div>
          <div style="width:100%;height:1px;background:var(--border);margin:6px 0;"></div>
          <div class="pillar-bot">${bot}</div>
        </div>`;
    });

    // 오행 바
    const OH_NAME = {'木':'목','火':'화','土':'토','金':'금','水':'수'};
    const ohaeng = result.ohaeng;
    const total = ohaeng.total || 1;
    const bars = document.getElementById('ohaeng-bars');
    bars.innerHTML = '';
    ['木','火','土','金','水'].forEach(oh => {
      const cnt = ohaeng.counts[oh] || 0;
      const pct = Math.round(cnt / total * 100);
      bars.innerHTML += `
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:14px;font-weight:700;width:22px;text-align:center;color:${OH_COLOR[oh]}">${OH_NAME[oh]}</span>
          <div class="oh-bar" style="flex:1;"><div class="oh-fill" style="width:${pct}%;background:${OH_COLOR[oh]};"></div></div>
          <span style="font-size:12px;color:var(--text-sub);width:14px;text-align:right;">${cnt}</span>
        </div>`;
    });

    // 부족한 오행
    if (ohaeng.lacking.length > 0) {
      document.getElementById('lacking-box').style.display = '';
      document.getElementById('lacking-list').innerHTML = ohaeng.lacking.map(oh =>
        `<span style="padding:4px 12px;border-radius:20px;border:1px solid ${OH_COLOR[oh]};
                      font-size:13px;font-weight:700;color:${OH_COLOR[oh]}">${oh}</span>`
      ).join('');
      document.getElementById('balanced-msg').style.display = 'none';
    } else {
      document.getElementById('lacking-box').style.display = 'none';
      document.getElementById('balanced-msg').style.display = '';
    }

    // 일간 해석
    document.getElementById('ilgan-desc').textContent = ILGAN_DESC[result.pillars.ilju?.gan] || '';

    goStep(2);
  }

  // ── 타로 ──────────────────────────────────────────────
  const TAROT_CARDS = [
    { name:'바보', num:'0', img:'0', keyword:'새출발·용기·모험', up:'지금이 바로 새로운 여정을 시작할 때입니다.\n설렘을 나침반 삼아 용기 있게 한 발 내딛으면 예상치 못한 행운이 따릅니다.', down:'충분한 준비 없이 서두르다 실수를 할 수 있는 시기입니다.\n충동보다 신중함을, 즉흥보다 계획을 먼저 세워보세요.' },
    { name:'마법사', num:'I', img:'1', keyword:'의지·창조·능력', up:'당신에게는 꿈을 이룰 모든 능력이 이미 갖춰져 있습니다.\n의지와 집중력을 발휘하면 원하는 것을 현실로 만들 수 있습니다.', down:'능력이 있음에도 의지를 잃고 방향을 헤매고 있습니다.\n목표를 다시 점검하고 진정 원하는 것에 에너지를 집중하세요.' },
    { name:'여사제', num:'II', img:'2', keyword:'직관·신비·내면', up:'논리보다 직관이 지금 더 정확한 답을 알고 있습니다.\n서두르지 말고 내면의 소리에 조용히 귀 기울이면 진실이 드러납니다.', down:'감춰진 비밀이나 혼란이 상황을 복잡하게 만들고 있습니다.\n외부 소음에 흔들리지 말고 내 안의 고요한 목소리를 신뢰하세요.' },
    { name:'여황제', num:'III', img:'3', keyword:'풍요·모성·창조', up:'풍요롭고 창의적인 에너지가 넘치는 성장의 시기입니다.\n씨앗이 결실을 맺듯 당신의 노력이 아름다운 열매로 돌아옵니다.', down:'지나친 편안함에 안주하다 성장의 기회를 놓치고 있습니다.\n의존을 내려놓고 다시 스스로의 힘으로 움직일 시간입니다.' },
    { name:'황제', num:'IV', img:'4', keyword:'권위·안정·리더십', up:'체계와 원칙을 세울 때 흔들리지 않는 성과를 거둘 수 있습니다.\n강한 리더십으로 목표를 향해 꾸준히 나아가세요.', down:'지나친 고집과 독단이 주변과의 갈등을 키우고 있습니다.\n완고함을 내려놓고 타인의 의견에 귀 기울여 보세요.' },
    { name:'교황', num:'V', img:'5', keyword:'전통·조언·신뢰', up:'지금은 검증된 방법과 믿을 수 있는 조언이 가장 큰 힘이 됩니다.\n정도를 걷고 신뢰할 수 있는 안내자를 따르는 것이 현명한 선택입니다.', down:'기존 틀과 편견에 갇혀 새로운 가능성을 놓치고 있습니다.\n열린 마음으로 다른 시각을 받아들이면 더 넓은 길이 보입니다.' },
    { name:'연인', num:'VI', img:'6', keyword:'선택·사랑·조화', up:'중요한 선택의 기로에 서 있습니다. 마음이 이끄는 대로 가세요.\n진정한 연결과 조화가 당신을 기다리고 있습니다.', down:'갈등과 우유부단함이 더 좋은 기회를 밀어내고 있습니다.\n두려움에 멈추지 말고 자신의 마음을 솔직하게 따르세요.' },

  const SPREAD_LABELS = ['카드 1','카드 2','카드 3','카드 4','카드 5'];

  function drawCards() {
    const deck = [...TAROT_CARDS].sort(() => Math.random() - 0.5);
    const drawn = deck.slice(0, 5).map(c => ({ ...c, reversed: Math.random() > 0.6 }));
    const labels = SPREAD_LABELS;
    const container = document.getElementById('tarot-cards');
    container.innerHTML = '';
    drawn.forEach((card, i) => {
      const reading = card.reversed ? card.down : card.up;
      container.innerHTML += `
        <div class="card" style="border-left:4px solid var(--focus);">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
            <img src="cards/${card.img}.jpg"
                 style="width:64px;height:96px;object-fit:cover;border-radius:6px;
                        border:1px solid var(--border);
                        ${card.reversed ? 'transform:rotate(180deg);' : ''}"
                 alt="${card.name}" />
            <div>
              <div style="font-size:10px;color:var(--text-sub);letter-spacing:1px;">${labels[i] || ''}</div>
              <div style="font-size:16px;font-weight:700;color:var(--step-active);">
                ${card.name} ${card.reversed ? '(역방향)' : ''}
              </div>
              <div style="font-size:11px;color:var(--text-muted);">${card.num} · ${card.keyword}</div>
            </div>
          </div>
          <p style="font-size:13px;color:var(--text-sub);line-height:1.8;white-space:pre-line;">${reading}</p>
        </div>`;
    });
    document.getElementById('tarot-question-area').style.display = 'none';
    document.getElementById('tarot-result').style.display = '';
  }

  function resetTarot() {
    document.getElementById('tarot-question-area').style.display = '';
    document.getElementById('tarot-result').style.display = 'none';
    document.getElementById('tarot-cards').innerHTML = '';
  }

  function goTarot() {
    resetTarot();
    goStep(3);
  }
</script>
